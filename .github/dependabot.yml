version: 2
updates:
  # Enable version updates for Python dependencies
  # Note: pip does not auto-follow subdirectories, so the mcp-server
  # project must be listed explicitly or its deps/advisories never get PRs.
  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/mcp-server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      all-dependencies:
        patterns:
          - "*"
    reviewers:
      - "weirdtangent"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      all-actions:
        patterns:
          - "*"
    reviewers:
      - "weirdtangent"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
